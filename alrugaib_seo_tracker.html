<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Al Rugaib - SEO Content Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0a;color:#e8e4dc;min-height:100vh}
:root{--gold:#D4AF37;--gold-dim:#a88520;--black:#000;--surface:#111;--surface2:#1a1a1a;--border:#2a2a2a;--text:#e8e4dc;--muted:#666;--critical:#C0392B;--critical-bg:rgba(192,57,43,0.15);--warning:#D97706;--warning-bg:rgba(215,119,6,0.15);--ok:#16A34A;--ok-bg:rgba(22,163,74,0.15)}

/* HEADER */
.hdr{background:#000;border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.hdr-brand{display:flex;align-items:center;gap:10px}
.hdr-logo{font-size:16px;font-weight:700;color:var(--gold);letter-spacing:-0.3px}
.hdr-sep{width:1px;height:16px;background:#333}
.hdr-title{font-size:11px;color:#555;text-transform:uppercase;letter-spacing:1px}
.hdr-user{display:flex;align-items:center;gap:8px;font-size:12px;color:#888}
.hdr-user strong{color:var(--gold)}
.btn-logout{background:none;border:1px solid #333;color:#666;padding:4px 10px;border-radius:2px;cursor:pointer;font-size:11px}
.btn-logout:hover{border-color:#555;color:#999}

/* SCREENS */
.screen{min-height:calc(100vh - 56px);padding:32px 24px}
.screen-center{display:flex;align-items:center;justify-content:center;flex-direction:column;gap:24px}

/* LOGIN */
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:2px;padding:40px;width:100%;max-width:440px}
.login-title{font-size:22px;font-weight:700;margin-bottom:6px;letter-spacing:-0.5px}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:28px}
.form-group{margin-bottom:16px}
.form-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);margin-bottom:6px;display:block}
.form-select,.form-input{width:100%;background:#000;border:1px solid #333;color:var(--text);padding:10px 12px;font-size:13px;border-radius:2px;outline:none}
.form-select:focus,.form-input:focus{border-color:var(--gold)}
.form-select option{background:#111}
.btn-primary{background:var(--gold);color:#000;border:none;padding:11px 20px;font-size:13px;font-weight:700;border-radius:2px;cursor:pointer;width:100%;text-transform:uppercase;letter-spacing:0.5px;margin-top:8px}
.btn-primary:hover{background:#e8c43d}
.btn-primary:disabled{opacity:0.4;cursor:not-allowed}

/* FLOW STEPS */
.steps{display:flex;align-items:center;gap:0;margin-bottom:28px}
.step{display:flex;align-items:center;gap:8px;font-size:12px}
.step-num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:1px solid #333;color:#555}
.step.active .step-num{background:var(--gold);color:#000;border-color:var(--gold)}
.step.done .step-num{background:#333;color:var(--gold);border-color:#333}
.step-label{color:#555;font-weight:600}
.step.active .step-label{color:var(--text)}
.step-sep{width:32px;height:1px;background:#333;margin:0 4px}

/* BRAND SELECTION */
.brand-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:20px}
.brand-card{background:var(--surface);border:1px solid var(--border);border-radius:2px;padding:16px 18px;cursor:pointer;transition:border-color 0.15s}
.brand-card:hover{border-color:#444}
.brand-card.selected{border-color:var(--gold);background:rgba(212,175,55,0.05)}
.brand-name{font-size:13px;font-weight:700;margin-bottom:4px}
.brand-count{font-size:11px;color:var(--critical)}
.brand-pct{font-size:10px;color:var(--muted);margin-top:2px}
.brand-add{background:none;border:1px dashed #333;color:#555;padding:16px 18px;border-radius:2px;cursor:pointer;font-size:12px;text-align:left;width:100%}
.brand-add:hover{border-color:#555;color:#888}
.custom-brand-row{display:flex;gap:8px;margin-bottom:20px}
.custom-brand-row .form-input{flex:1}
.btn-sec{background:none;border:1px solid #333;color:#999;padding:9px 16px;font-size:12px;font-weight:600;border-radius:2px;cursor:pointer}
.btn-sec:hover{border-color:#555;color:var(--text)}

/* PRIORITY LIST */
.list-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.list-title{font-size:15px;font-weight:700}
.list-meta{font-size:12px;color:var(--muted)}
.filter-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.filter-row .form-select{width:auto;padding:6px 10px;font-size:12px}
.filter-row .form-input{width:200px;padding:6px 10px;font-size:12px}
.count-pill{font-size:11px;background:rgba(212,175,55,0.12);color:var(--gold);padding:3px 10px;border-radius:20px}
.product-table{width:100%;border-collapse:collapse;font-size:12px}
.product-table thead th{background:#111;padding:8px 12px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none}
.product-table thead th:hover{color:var(--text)}
.product-table tbody td{padding:9px 12px;border-bottom:1px solid #1a1a1a;vertical-align:top}
.product-table tbody tr:hover{background:rgba(255,255,255,0.02)}
.product-title{font-weight:600;color:var(--text);max-width:240px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.product-type{font-size:10px;color:var(--muted);margin-top:2px}
.issue-tags{display:flex;flex-wrap:wrap;gap:3px}
.tag{display:inline-block;font-size:9px;font-weight:700;padding:2px 5px;border-radius:2px;text-transform:uppercase;letter-spacing:0.3px;white-space:nowrap}
.tc{background:var(--critical-bg);color:var(--critical)}
.tw{background:var(--warning-bg);color:var(--warning)}
.ti{background:rgba(29,78,216,0.15);color:#60A5FA}
.sev{font-size:10px;font-weight:700;padding:2px 7px;border-radius:2px;white-space:nowrap}
.sc{background:var(--critical);color:#fff}
.sh{background:var(--warning);color:#fff}
.sm{background:#222;color:#999}
.check-cell input[type=checkbox]{width:14px;height:14px;cursor:pointer;accent-color:var(--gold)}
.pagination{display:flex;align-items:center;justify-content:space-between;padding:12px 0;font-size:12px;color:var(--muted)}
.page-btns{display:flex;gap:4px}
.pb{padding:4px 10px;border:1px solid #333;background:none;color:#999;border-radius:2px;cursor:pointer;font-size:11px}
.pb:hover{border-color:#555;color:var(--text)}
.pb.active{background:var(--gold);color:#000;border-color:var(--gold)}

/* EXPORT TEMPLATE */
.export-card{background:var(--surface);border:1px solid var(--border);border-radius:2px;padding:24px;margin-bottom:16px}
.export-title{font-size:14px;font-weight:700;margin-bottom:8px}
.export-sub{font-size:12px;color:var(--muted);margin-bottom:16px;line-height:1.6}
.export-fields{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.export-field{background:#000;border:1px solid #2a2a2a;border-radius:2px;padding:10px 12px}
.ef-name{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--gold);margin-bottom:2px}
.ef-desc{font-size:11px;color:#666}
.btn-export{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:9px 18px;font-size:12px;font-weight:600;border-radius:2px;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.btn-export:hover{border-color:#444;background:#222}
.upload-zone{border:1px dashed #333;border-radius:2px;padding:24px;text-align:center;margin-bottom:16px}
.upload-zone-title{font-size:13px;color:#666;margin-bottom:4px}
.upload-zone-sub{font-size:11px;color:#444}

/* COMPLETION */
.completion-card{background:var(--surface);border:1px solid var(--border);border-radius:2px;padding:24px;text-align:center}
.big-pct{font-size:56px;font-weight:700;color:var(--gold);letter-spacing:-2px;line-height:1}
.completion-label{font-size:13px;color:var(--muted);margin-top:6px;margin-bottom:20px}
.progress-bar{background:#1a1a1a;height:6px;border-radius:3px;overflow:hidden;margin-bottom:20px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold-dim),var(--gold));border-radius:3px;transition:width 0.6s ease}
.stat-row{display:flex;justify-content:center;gap:32px;margin-bottom:20px}
.stat-item{text-align:center}
.stat-val{font-size:20px;font-weight:700;color:var(--text)}
.stat-label{font-size:11px;color:var(--muted);margin-top:2px}
.stat-val.red{color:var(--critical)}
.stat-val.green{color:var(--ok)}

/* REPORT */
.report-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:16px}
.report-table th{background:#111;padding:8px 12px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);border-bottom:1px solid var(--border)}
.report-table td{padding:10px 12px;border-bottom:1px solid #1a1a1a}
.pct-bar{height:4px;background:#1a1a1a;border-radius:2px;overflow:hidden;margin-top:4px}
.pct-fill{height:100%;background:var(--gold);border-radius:2px}

/* UTILS */
.section-hdr{margin-bottom:20px}
.section-hdr h2{font-size:18px;font-weight:700;letter-spacing:-0.3px}
.section-hdr p{font-size:13px;color:var(--muted);margin-top:4px}
.alert-bar{background:rgba(192,57,43,0.12);border:1px solid rgba(192,57,43,0.3);border-left:3px solid var(--critical);padding:10px 14px;border-radius:2px;font-size:12px;color:#f87171;margin-bottom:16px}
.ok-bar{background:rgba(22,163,74,0.12);border:1px solid rgba(22,163,74,0.3);border-left:3px solid var(--ok);padding:10px 14px;border-radius:2px;font-size:12px;color:#4ade80;margin-bottom:16px}
.main-content{max-width:1200px;margin:0 auto}
.action-row{display:flex;gap:10px;align-items:center;margin-top:16px}
@media(max-width:700px){.brand-grid{grid-template-columns:1fr}.export-fields{grid-template-columns:1fr}.stat-row{gap:16px}}
</style>

let state = {
  user: null,          // selected team member name
  step: 'login',       // login | brand | priority | export | complete
  brand: null,         // selected vendor name
  customBrand: '',
  showCustom: false,
  selected: [],        // handles selected for this work session

};

// ============================================================
// STORAGE HELPERS
// ============================================================
async function loadStorage() {
  try {
    const r = await window.storage.get('seo_tracker_sessions');
    if (r) state.sessions = JSON.parse(r.value) || [];
  } catch(e) {}
  try {
    const r = await window.storage.get('seo_tracker_completed');
    if (r) state.completed = JSON.parse(r.value) || {};
  } catch(e) {}
}
async function saveCompleted() {
  await window.storage.set('seo_tracker_completed', JSON.stringify(state.completed));
}
async function saveSession(session) {
  state.sessions.push(session);
  await window.storage.set('seo_tracker_sessions', JSON.stringify(state.sessions.slice(-200)));
}

// ============================================================
// DATA HELPERS
// ============================================================
function getProductsByBrand(brand) {
  return RAW.products.filter(p => p.v === brand).sort((a,b) => b.s - a.s);
}

function applyFilters(products) {
  const {issue, type, search} = state.filter;
  return products.filter(p => {
    if (issue && !p.i.includes(issue)) return false;
    if (type && p.pt !== type) return false;
    if (search && !p.t.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });
}

function getCompletedForBrand(brand) {
  return state.completed[brand] || {};
}

function markComplete(brand, handles) {
  if (!state.completed[brand]) state.completed[brand] = {};
  const ts = Date.now();
  handles.forEach(h => state.completed[brand][h] = ts);
  saveCompleted();
}

function getBrandStats(brand) {
  const products = getProductsByBrand(brand);
  const completed = getCompletedForBrand(brand);
  const total = products.length;
  const done = products.filter(p => completed[p.h]).length;
  return { total, done, pct: total ? Math.round(done/total*100) : 0 };
}

function getVendorInfo(vendor) {
  return RAW.vendors.find(v => v.v === vendor) || {v: vendor, n: 0, tot: 0};
}

function getAllBrandProgress() {
  const seen = new Set();
  const rows = [];
  RAW.vendors.forEach(v => {
    if (v.n === 0) return;
    const stats = getBrandStats(v.v);
    rows.push({
      brand: v.v, total: stats.total, done: stats.done,
      pct: stats.pct, totalActive: v.tot
    });
  });
  return rows.sort((a,b) => b.total - a.total);
}

function getUniqueTypes(brand) {
  const ps = getProductsByBrand(brand);
  return [...new Set(ps.map(p => p.pt).filter(Boolean))].sort();
}

function exportCSV(brand, products) {
  const cols = ['Handle','Product Title','Product Type','Current SEO Title',
                'NEW SEO Title (max 60 chars)','NEW SEO Description (max 160 chars)',
                'NEW Body Description (HTML ok)','Issues','Shopify Admin URL'];
  const rows = [cols.map(c => `"${c}"`).join(',')];
  products.forEach(p => {
    const issues = p.i.map(i => ISSUE_LABEL[i]||i).join('; ');
    rows.push([
      `"${p.h}"`,
      `"${p.t.replace(/"/g,'""')}"`,
      `"${p.pt}"`,
      `"${p.st.replace(/"/g,'""')}"`,
      '""',
      '""',
      '""',
      `"${issues}"`,
      `"${ADMIN_BASE}${p.h}"`
    ].join(','));
  });
  const blob = new Blob([rows.join('
')], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `seo_template_${brand.replace(/\s+/g,'_')}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function sevBadge(s) {
  if(s>=25) return `<span class="sev sc">Critical</span>`;
  if(s>=15) return `<span class="sev sh">High</span>`;
  return `<span class="sev sm">Medium</span>`;
}

// PRIORITY LIST
function renderPriority() {

    return av<bv ? -dir : av>bv ? dir : 0;
  });

  const total = sorted.length;
  const start = state.page * state.PAGE_SIZE;
  const end = Math.min(start + state.PAGE_SIZE, total);

        <thead>

// ============================================================
// ACTIONS
// ============================================================
function logout() { state = {...state, user:null, step:'login', brand:null, selected:[]}; render(); }
function goReport() { state.step = 'report'; render(); }

function attachEvents() {
  const btnStart = document.getElementById('btn-start');
  if (btnStart) btnStart.onclick = () => {
    const sel = document.getElementById('user-select');
    if (sel && sel.value) { state.user = sel.value; state.step = 'brand'; render(); }
  };
}

function selectBrand(v) { state.brand = v; state.showCustom = false; render(); }
function showCustom() { state.showCustom = true; state.brand = null; render(); document.getElementById('custom-brand-input')?.focus(); }
function cancelCustom() { state.showCustom = false; render(); }
function confirmCustomBrand() {
  const val = document.getElementById('custom-brand-input')?.value?.trim();
  if (val) { state.brand = val; state.customBrand = val; state.showCustom = false; render(); }
}

function goToPriority() {
  if (!state.brand) return;
  state.step = 'priority';
  state.filter = {issue:'',type:'',search:''};
  state.page = 0;
  state.selected = [];
  render();
}

function goToExport() { state.step = 'export'; render(); }
function goToComplete() { state.step = 'complete'; render(); }

function updateFilter(key, val) {
  state.filter[key] = val;
  state.page = 0;
  render();
}

function setSort(key) {
  if (state.sort.key === key) state.sort.dir *= -1;
  else { state.sort.key = key; state.sort.dir = key === 's' ? -1 : 1; }
  state.page = 0;
  render();
}

function setPage(p) { state.page = p; render(); }

function toggleProduct(handle, checked) {
  if (checked) { if (!state.selected.includes(handle)) state.selected.push(handle); }
  else { state.selected = state.selected.filter(h => h !== handle); }
}

function toggleAll(checked, handlesStr) {
  const handles = (handlesStr||'').split(',').filter(Boolean);
  const pageHandles = handles.slice(state.page * state.PAGE_SIZE, (state.page+1) * state.PAGE_SIZE);
  if (checked) {
    pageHandles.forEach(h => { if (!state.selected.includes(h)) state.selected.push(h); });
  } else {
    state.selected = state.selected.filter(h => !pageHandles.includes(h));
  }
  render();
}

function clearSelected() { state.selected = []; render(); }

function markOneDone(handle) {
  markComplete(state.brand, [handle]);
  state.selected = state.selected.filter(h => h !== handle);
  render();
}

function markSelectedDone() {
  if (!state.selected.length) return;
  markComplete(state.brand, [...state.selected]);
  state.selected = [];
  const msg = document.getElementById('done-msg');
  if (msg) { msg.style.display = 'block'; setTimeout(() => msg && (msg.style.display='none'), 3000); }
  render();
}

function markAllRemainingDone() {
  const products = getProductsByBrand(state.brand);
  const completed = getCompletedForBrand(state.brand);
  const remaining = products.filter(p => !completed[p.h]).map(p => p.h);
  markComplete(state.brand, remaining);
  const msg = document.getElementById('done-msg');
  if (msg) { msg.style.display = 'block'; setTimeout(() => msg && (msg.style.display='none'), 3000); }
  render();
}

function triggerExport() {
  const products = getProductsByBrand(state.brand);
  const completed = getCompletedForBrand(state.brand);
  const toExport = state.selected.length > 0
    ? products.filter(p => state.selected.includes(p.h))
    : products.filter(p => !completed[p.h]);
  exportCSV(state.brand, toExport);
}

function exportSelected() {
  const products = getProductsByBrand(state.brand);
  const toExport = products.filter(p => state.selected.includes(p.h));
  exportCSV(state.brand, toExport);
}

// ============================================================
// INIT
// ============================================================
loadStorage().then(() => render());
</script>
</body>
</html>
